<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AlgoVisualizer — Reverse String</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #6e7681;
    --accent: #3fb950;
    --accent-dim: #2ea043;
    --pointer-l: #58a6ff;
    --pointer-r: #f78166;
    --mono: "JetBrains Mono", "Fira Code", Consolas, monospace;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    margin: 0;
    min-height: 100vh;
  }

  .wrap { max-width: 720px; width: 100%; }

  .eyebrow {
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  h1 {
    font-size: 28px;
    margin: 0 0 6px;
    font-weight: 600;
  }

  .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  input[type="text"] {
    flex: 1;
    min-width: 180px;
    background: #0d1117;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 14px;
  }

  input[type="text"]:focus { outline: 2px solid var(--accent); }

  button {
    background: var(--accent-dim);
    color: #0d1117;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }

  button:hover { background: var(--accent); }
  button:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .stage {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 30px 0;
    flex-wrap: wrap;
    min-height: 64px;
  }

  .cell {
    width: 44px;
    height: 44px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    position: relative;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
  }

  .cell.left { border-color: var(--pointer-l); }
  .cell.right { border-color: var(--pointer-r); }
  .cell.swapped { background: rgba(63, 185, 80, 0.15); }
  .cell.done { border-color: var(--accent); }

  .label {
    position: absolute;
    top: -22px;
    font-size: 10px;
    letter-spacing: 1px;
  }
  .label.l { color: var(--pointer-l); }
  .label.r { color: var(--pointer-r); }

  .log {
    border-top: 1px solid var(--border);
    padding-top: 16px;
    font-size: 13px;
    color: var(--muted);
    min-height: 20px;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }

  .meta span { color: var(--accent); }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Pattern 01 / Two Pointer</div>
  <h1>Reverse a String</h1>
  <div class="sub">Swap characters from both ends moving inward until the pointers meet.</div>

  <div class="panel">
    <div class="controls">
      <input type="text" id="inputStr" placeholder="Type a string..." value="hello world">
      <button id="runBtn">Run</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="stage" id="stage"></div>

    <div class="log" id="log">Press Run to start the visualization.</div>

    <div class="meta">
      <span id="stepCount">Step 0</span>
      <span>Time: O(n) &nbsp; Space: O(1)</span>
    </div>
  </div>
</div>

<script>
const stage = document.getElementById('stage');
const log = document.getElementById('log');
const stepCount = document.getElementById('stepCount');
const runBtn = document.getElementById('runBtn');
const resetBtn = document.getElementById('resetBtn');
const inputStr = document.getElementById('inputStr');

let chars = [];
let running = false;

function render() {
  stage.innerHTML = '';
  chars.forEach((ch) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = ch === ' ' ? '·' : ch;
    cell.dataset.idx = '';
    stage.appendChild(cell);
  });
}

function setup() {
  const val = inputStr.value || 'hello world';
  chars = val.split('');
  render();
  stepCount.textContent = 'Step 0';
  log.textContent = 'Press Run to start the visualization.';
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function runReverse() {
  if (running) return;
  running = true;
  runBtn.disabled = true;

  let left = 0;
  let right = chars.length - 1;
  let step = 0;
  const cells = () => stage.querySelectorAll('.cell');

  while (left < right) {
    step++;
    const cellList = cells();
    cellList.forEach(c => c.classList.remove('left', 'right'));
    cellList[left].classList.add('left');
    cellList[right].classList.add('right');

    const lLabel = document.createElement('div');
    lLabel.className = 'label l';
    lLabel.textContent = 'L';
    cellList[left].appendChild(lLabel);

    const rLabel = document.createElement('div');
    rLabel.className = 'label r';
    rLabel.textContent = 'R';
    cellList[right].appendChild(rLabel);

    log.textContent = `Step ${step}: swap index ${left} ('${chars[left]}') with index ${right} ('${chars[right]}')`;
    stepCount.textContent = `Step ${step}`;

    await sleep(650);

    [chars[left], chars[right]] = [chars[right], chars[left]];
    cellList[left].textContent = chars[left] === ' ' ? '·' : chars[left];
    cellList[right].textContent = chars[right] === ' ' ? '·' : chars[right];
    cellList[left].classList.add('swapped');
    cellList[right].classList.add('swapped');

    await sleep(400);

    left++;
    right--;
  }

  cells().forEach(c => {
    c.classList.remove('left', 'right', 'swapped');
    c.classList.add('done');
    c.innerHTML = c.textContent;
  });

  log.textContent = `Done. Reversed string: "${chars.join('')}"`;
  stepCount.textContent = `Completed in ${step} step(s)`;
  running = false;
  runBtn.disabled = false;
}

runBtn.addEventListener('click', runReverse);
resetBtn.addEventListener('click', setup);
inputStr.addEventListener('keydown', (e) => { if (e.key === 'Enter') setup(); });

setup();
</script>

</body>
</html>
